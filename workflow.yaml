name: GitHub Actions Demo

# 1. What triggers the workflow
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows you to manually click "Run workflow" in GitHub

# 2. What the workflow actually does
jobs:
  build-and-test:
    name: Run Verification
    runs-on: ubuntu-latest # The type of virtual machine executing the code

    steps:
      # Step 1: Download your repository code onto the runner
      - name: Check out repository code
        uses: actions/checkout@v4

      # Step 2: Set up your programming environment (Example: Node.js)
      - name: Set up Node.js runtime
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Run project commands
      - name: Install project dependencies
        run: npm ci

      - name: Run code tests
        run: npm test
